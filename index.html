<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>壞壞同事測驗 😈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FFF8F0;--coral:#FF6B6B;--peach:#FFB347;
    --mint:#6BDFB8;--lavender:#C3B1E1;--navy:#2D2A4A;
    --yellow:#FFE066;--pink:#FF8FAB;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden;position:relative;}
  .bg-doodles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .bg-doodle{position:absolute;opacity:.07;animation:floatDoodle 8s ease-in-out infinite;}
  .bg-doodle:nth-child(1){top:5%;left:3%;animation-delay:0s;}
  .bg-doodle:nth-child(2){top:15%;right:5%;animation-delay:1.5s;}
  .bg-doodle:nth-child(3){top:40%;left:8%;animation-delay:3s;}
  .bg-doodle:nth-child(4){top:65%;right:10%;animation-delay:4.5s;}
  .bg-doodle:nth-child(5){bottom:10%;left:15%;animation-delay:2s;}
  .bg-doodle:nth-child(6){bottom:20%;right:3%;animation-delay:.8s;}
  @keyframes floatDoodle{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-20px) rotate(5deg);}}
  .container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .screen{width:100%;display:none;animation:fadeSlideIn .4s ease;}
  .screen.active{display:flex;flex-direction:column;align-items:center;}
  @keyframes fadeSlideIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

  /* INTRO */
  .intro-card{background:white;border-radius:32px;padding:40px 36px;text-align:center;box-shadow:8px 8px 0 var(--navy);border:3px solid var(--navy);width:100%;position:relative;overflow:hidden;}
  .intro-card::before{content:'';position:absolute;top:0;left:0;right:0;height:8px;background:repeating-linear-gradient(90deg,var(--coral) 0,var(--coral) 20%,var(--peach) 20%,var(--peach) 40%,var(--mint) 40%,var(--mint) 60%,var(--lavender) 60%,var(--lavender) 80%,var(--yellow) 80%,var(--yellow) 100%);}
  .intro-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,3rem);color:var(--navy);line-height:1.1;margin-top:8px;}
  .intro-subtitle{font-size:.95rem;color:#888;margin:12px 0 28px;line-height:1.75;}
  .intro-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
  .intro-tag{padding:5px 16px;border-radius:99px;font-size:.8rem;font-weight:700;border:2px solid var(--navy);background:#F5F5FF;color:var(--navy);}
  .btn-start{background:var(--navy);color:white;border:none;padding:16px 48px;border-radius:99px;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;box-shadow:4px 4px 0 var(--coral);transition:transform .15s,box-shadow .15s;}
  .btn-start:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--coral);}
  .btn-start:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--coral);}

  /* QUIZ */
  .q-counter{font-size:.8rem;color:#BBB;font-weight:700;margin-bottom:12px;text-align:right;width:100%;}
  .progress-bar-wrap{width:100%;height:10px;background:#EEE;border-radius:99px;margin-bottom:20px;overflow:hidden;border:2px solid var(--navy);}
  .progress-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--coral),var(--peach));transition:width .4s ease;}
  .section-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 18px;border-radius:99px;font-size:.8rem;font-weight:700;border:2px solid var(--navy);margin-bottom:16px;}
  .section-badge.bad{background:#FFE5E5;color:var(--coral);}
  .section-badge.good{background:#E5FFF6;color:#3DBFA0;}
  .q-card{background:white;border-radius:28px;padding:32px 28px;border:3px solid var(--navy);box-shadow:6px 6px 0 var(--navy);width:100%;margin-bottom:20px;}
  .q-illust{width:130px;height:130px;margin:0 auto 20px;display:block;}
  .q-number{font-size:.75rem;font-weight:700;color:#BBB;letter-spacing:1px;margin-bottom:6px;}
  .q-text{font-size:1.1rem;font-weight:700;color:var(--navy);line-height:1.6;margin-bottom:24px;}
  .slider-labels{display:flex;justify-content:space-between;font-size:.75rem;font-weight:700;color:#AAA;margin-bottom:8px;}
  input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:99px;outline:none;cursor:pointer;border:2px solid var(--navy);}
  input[type=range].bad-slider{background:linear-gradient(90deg,#FFD1D1,var(--coral));}
  input[type=range].good-slider{background:linear-gradient(90deg,#D1FFF0,var(--mint));}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:white;border:3px solid var(--navy);box-shadow:2px 2px 0 var(--navy);transition:transform .1s;}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
  .slider-value{text-align:center;font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--navy);margin-top:10px;}
  .slider-value span{font-size:.9rem;color:#AAA;font-family:'Noto Sans TC',sans-serif;font-weight:400;}
  .slider-emoji-row{display:flex;justify-content:space-between;font-size:1.1rem;margin-top:6px;}
  .btn-row{display:flex;gap:12px;width:100%;}
  .btn-prev{flex:1;background:white;border:3px solid var(--navy);border-radius:99px;padding:14px;font-size:1rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;color:var(--navy);transition:background .15s;}
  .btn-prev:hover{background:#F5F5F5;}
  .btn-next{flex:2;background:var(--navy);color:white;border:3px solid var(--navy);border-radius:99px;padding:14px;font-size:1rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;box-shadow:4px 4px 0 var(--coral);transition:transform .15s,box-shadow .15s;}
  .btn-next:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--coral);}

  /* RESULT */
  .result-card{background:white;border-radius:32px;padding:40px 32px;border:3px solid var(--navy);box-shadow:8px 8px 0 var(--navy);width:100%;text-align:center;position:relative;overflow:hidden;}
  .result-banner{position:absolute;top:0;left:0;right:0;height:10px;}
  .result-title{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.5rem);color:var(--navy);margin:16px 0 6px;line-height:1.2;}
  .result-subtitle{font-size:.9rem;color:#888;margin-bottom:22px;}
  .score-display{display:inline-flex;align-items:baseline;gap:6px;background:var(--navy);color:white;border-radius:16px;padding:12px 28px;margin-bottom:20px;font-family:'Fredoka One',cursive;}
  .score-num{font-size:2.8rem;}
  .score-label{font-size:.9rem;opacity:.7;}
  .score-breakdown{display:flex;gap:12px;justify-content:center;margin-bottom:22px;flex-wrap:wrap;}
  .score-pill{padding:7px 16px;border-radius:99px;font-size:.82rem;font-weight:700;border:2px solid var(--navy);}
  .score-pill.bad{background:#FFE5E5;color:var(--coral);}
  .score-pill.good{background:#E5FFF6;color:#3DBFA0;}
  .result-desc{background:var(--cream);border-radius:16px;padding:20px;font-size:.95rem;line-height:1.8;color:#555;margin-bottom:28px;border:2px dashed #DDD;text-align:left;}
  .btn-retry{background:var(--coral);color:white;border:3px solid var(--navy);border-radius:99px;padding:14px 40px;font-size:1rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;box-shadow:4px 4px 0 var(--navy);transition:transform .15s,box-shadow .15s;}
  .btn-retry:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--navy);}

  /* CONFETTI */
  .confetti-piece{position:fixed;pointer-events:none;z-index:999;border-radius:2px;animation:confettiFall 3s ease-in forwards;}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>

  {range:[23,38],   title:'微微壞壞 😏',         subtitle:'壞壞指數中等，還有成長空間！',          banner:'linear-gradient(90deg,#FFB347,#FFE066)',           illust:'mild',   desc:'😏 結果描述待補充 😏\n\n這裡會放這個等級的描述！'},
  {range:[39,55],   title:'相當壞壞 😤',         subtitle:'同事私下肯定在討論你！',               banner:'linear-gradient(90deg,#FF8FAB,#FF6B6B)',           illust:'bad',    desc:'😤 結果描述待補充 😤\n\n這裡會放這個等級的描述！'},
  {range:[56,9999], title:'傳說中的壞壞同事 😈', subtitle:'你就是大家最怕遇到的那個人...',         banner:'linear-gradient(90deg,#FF6B6B,#C3B1E1,#FF6B6B)',   illust:'devil',  desc:'😈 結果描述待補充 😈\n\n這裡會放這個等級的描述！'},
];

let currentQ=0, answers=new Array(questions.length).fill(4);

function startQuiz(){showScreen('screen-quiz');renderQ(0);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function renderQ(i){
  currentQ=i;
  const q=questions[i], tot=questions.length;
  document.getElementById('progress-fill').style.width=(i/tot*100)+'%';
  document.getElementById('q-counter').textContent=`${i+1} / ${tot}`;
  const badge=document.getElementById('section-badge');
  if(q.type==='bad'){badge.textContent='😈 壞壞行為';badge.className='section-badge bad';}
  else{badge.textContent='🌟 加分表現';badge.className='section-badge good';}
  document.getElementById('q-illust').innerHTML=illusts[q.illust]||'';
  document.getElementById('q-number').textContent=`Q${i+1}`;
  document.getElementById('q-text').textContent=q.text;
  const slider=document.getElementById('q-slider');
  slider.value=answers[i];
  slider.className=q.type==='bad'?'bad-slider':'good-slider';
  updateSlider(answers[i]);
  const er=document.getElementById('emoji-row');er.innerHTML='';
  [0,3,6,9].forEach(idx=>{const sp=document.createElement('span');sp.textContent=q.emojiScale[idx];sp.style.fontSize='1.1rem';er.appendChild(sp);});
  document.getElementById('btn-prev').style.opacity=i===0?'0.3':'1';
  document.getElementById('btn-prev').disabled=i===0;
  document.getElementById('btn-next').textContent=i===tot-1?'看結果！🎉':'下一題 →';
}

function updateSlider(val){answers[currentQ]=parseInt(val);document.getElementById('slider-val').innerHTML=`${val} <span>/ 9</span>`;}
function prevQ(){if(currentQ>0)renderQ(currentQ-1);}
function nextQ(){currentQ<questions.length-1?renderQ(currentQ+1):showResult();}

function showResult(){
  let bad=0,good=0;
  questions.forEach((q,i)=>{if(q.type==='bad')bad+=answers[i];else good+=answers[i];});
  const score=bad-good;
  const result=results.find(r=>score>=r.range[0]&&score<=r.range[1])||results[results.length-1];
  document.getElementById('result-title').textContent=result.title;
  document.getElementById('result-subtitle').textContent=result.subtitle;
  document.getElementById('result-score').textContent=Math.max(0,score);
  document.getElementById('result-banner').style.background=result.banner;
  document.getElementById('bad-score-pill').textContent=`壞壞累積 ${bad} 分`;
  document.getElementById('good-score-pill').textContent=`善良加回 ${good} 分`;
  document.getElementById('result-desc').innerHTML=result.desc.replace(/\n/g,'<br>');
  document.getElementById('result-illust').innerHTML=resultIllusts[result.illust]||'';
  showScreen('screen-result');
  launchConfetti();
}

function restart(){answers=new Array(questions.length).fill(4);currentQ=0;showScreen('screen-intro');}

function launchConfetti(){
  const cols=['#FF6B6B','#FFB347','#6BDFB8','#C3B1E1','#FFE066','#FF8FAB'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    },i*30);
  }
}
</script>
